services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - mailserver-database
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "9080:8080"
    volumes:
      - kc-data:/opt/keycloak/data
    networks:
      - mailserver-keycloak
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  mailserver:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      SERVER_SERVLET_CONTEXT_PATH: ${SERVER_SERVLET_CONTEXT_PATH:-/api}
      SPRINGDOC_API_DOCS_PATH: ${SPRINGDOC_API_DOCS_PATH:-/v3/api-docs}
      SPRINGDOC_API_DOCS_ENABLED: ${SPRINGDOC_API_DOCS_ENABLED:-true}
      SPRINGDOC_SWAGGER_UI_PATH: ${SPRINGDOC_SWAGGER_UI_PATH:-/swagger-ui}
      SPRINGDOC_SWAGGER_UI_ENABLED: ${SPRINGDOC_SWAGGER_UI_ENABLED:-true}
      DB_URL: jdbc:postgresql://database:5432/${DB_NAME}
      DB_DRIVER: ${DB_DRIVER}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DDL_AUTO: ${DB_DDL_AUTO}
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:-http://localhost:9080/realms/mail-system}
      OAUTH2_JWK_SET_URI: ${OAUTH2_JWK_SET_URI:-http://keycloak:8080/realms/mail-system/protocol/openid-connect/certs}
      FILE_UPLOAD_DIR: /app/uploads
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_SMTP_ENABLED: ${MAIL_SMTP_ENABLED}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT}
      MAIL_SMTP_USERNAME: ${MAIL_SMTP_USERNAME}
      MAIL_SMTP_PASSWORD: ${MAIL_SMTP_PASSWORD}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_SSL_ENABLED: ${MAIL_SMTP_SSL_ENABLED}
      MAIL_SMTP_STARTTLS_ENABLED: ${MAIL_SMTP_STARTTLS_ENABLED}
      MAIL_SMTP_CONNECTION_TIMEOUT_MS: ${MAIL_SMTP_CONNECTION_TIMEOUT_MS}
      MAIL_SMTP_READ_TIMEOUT_MS: ${MAIL_SMTP_READ_TIMEOUT_MS}
      MAIL_SMTP_WRITE_TIMEOUT_MS: ${MAIL_SMTP_WRITE_TIMEOUT_MS}
      MAIL_IMAP_ENABLED: ${MAIL_IMAP_ENABLED}
      MAIL_IMAP_HOST: ${MAIL_IMAP_HOST}
      MAIL_IMAP_PORT: ${MAIL_IMAP_PORT}
      MAIL_IMAP_USERNAME: ${MAIL_IMAP_USERNAME}
      MAIL_IMAP_PASSWORD: ${MAIL_IMAP_PASSWORD}
      MAIL_IMAP_FOLDER: ${MAIL_IMAP_FOLDER}
      MAIL_IMAP_SSL_ENABLED: ${MAIL_IMAP_SSL_ENABLED}
      MAIL_IMAP_CONNECTION_TIMEOUT_MS: ${MAIL_IMAP_CONNECTION_TIMEOUT_MS}
      MAIL_IMAP_READ_TIMEOUT_MS: ${MAIL_IMAP_READ_TIMEOUT_MS}
      MAIL_IMAP_FETCH_LIMIT: ${MAIL_IMAP_FETCH_LIMIT}
      MAIL_IMAP_POLL_INITIAL_DELAY_MS: ${MAIL_IMAP_POLL_INITIAL_DELAY_MS}
      MAIL_IMAP_POLL_DELAY_MS: ${MAIL_IMAP_POLL_DELAY_MS}
    expose:
      - "${SERVER_PORT:-8080}"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - mailserver-database
      - mailserver-keycloak
      - proxy-mailserver
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /var/log:rw,noexec,nosuid,size=128m

  mailclient:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mailserver
    expose:
      - "80"
    networks:
      - proxy-mailclient
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

  proxy:
    image: owasp/modsecurity-crs:4.25-nginx-lts
    restart: unless-stopped
    depends_on:
      mailserver:
        condition: service_started
      mailclient:
        condition: service_started
    environment:
      SERVER_NAME: localhost
      PORT: "8080"
      SSL_PORT: "8443"
      NGINX_ALWAYS_TLS_REDIRECT: "on"
      SSL_CERT_FILE: /run/secrets/proxy_certificate
      SSL_CERT_KEY_FILE: /run/secrets/proxy_private_key
      MODSEC_RULE_ENGINE: "On"
      MODSEC_AUDIT_ENGINE: "RelevantOnly"
      MODSEC_AUDIT_LOG: /dev/stdout
      MODSEC_AUDIT_LOG_FORMAT: JSON
      BLOCKING_PARANOIA: "2"
      DETECTION_PARANOIA: "3"
      ALLOWED_METHODS: "GET HEAD POST PUT PATCH DELETE OPTIONS"
      MODSEC_REQ_BODY_ACCESS: "On"
      MODSEC_REQ_BODY_LIMIT: "13107200"
      MODSEC_REQ_BODY_NOFILES_LIMIT: "1048576"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/templates/conf.d/default.conf.template:ro
    secrets:
      - proxy_certificate
      - proxy_private_key
    networks:
      - proxy-mailclient
      - proxy-mailserver
      - ips-proxy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  ips:
    build:
      context: ./ips
    restart: unless-stopped
    environment:
      FORWARD_HOST: proxy
      FORWARD_PORT: 8443
    ports:
      - "80:8080"
      - "443:8443"
    cap_add:
      - DAC_OVERRIDE
      - NET_ADMIN
      - NET_RAW
      - SETGID
      - SETUID
    sysctls:
      net.ipv4.ip_forward: "1"
    depends_on:
      - proxy
    networks:
      - ips-proxy

volumes:
  db_data:
  uploads_data:
  kc-data:

secrets:
  proxy_certificate:
    file: ./proxy/cert/proxy.crt
  proxy_private_key:
    file: ./proxy/cert/proxy.key

networks:
  mailserver-database:
  mailserver-keycloak:
  proxy-mailclient:
  proxy-mailserver:
  ips-proxy:
