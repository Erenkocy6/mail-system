<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Mail System Architecture Overview</title>
  <desc id="desc">Architecture diagram showing browser, Angular frontend served by Caddy, Caddy reverse proxy, Spring Boot REST API, PostgreSQL database, upload storage, and generated OpenAPI documentation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="680" fill="#f8fafc"/>
  <text x="600" y="56" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Mail System Architecture</text>
  <text x="600" y="88" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Frontend, API, persistence, storage, and generated API documentation</text>

  <rect x="66" y="160" width="190" height="104" rx="16" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="161" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Browser</text>
  <text x="161" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">User interface</text>

  <rect x="356" y="136" width="248" height="152" rx="18" fill="#eff6ff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="480" y="178" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#1e3a8a">Angular Frontend</text>
  <text x="480" y="205" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">Served by Caddy</text>
  <text x="480" y="235" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Routes, forms, views</text>
  <text x="480" y="260" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Base path: /app/</text>

  <rect x="356" y="360" width="248" height="104" rx="18" fill="#f0fdf4" stroke="#86efac" filter="url(#shadow)"/>
  <text x="480" y="400" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#166534">Caddy Proxy</text>
  <text x="480" y="430" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Forwards /api/*</text>

  <rect x="720" y="146" width="280" height="164" rx="18" fill="#fff7ed" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="860" y="188" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#9a3412">Spring Boot REST API</text>
  <text x="860" y="216" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Kotlin backend</text>
  <text x="860" y="244" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Keycloak Bearer token validation</text>
  <text x="860" y="272" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Context path: /api</text>

  <rect x="752" y="386" width="216" height="102" rx="18" fill="#fef2f2" stroke="#fca5a5" filter="url(#shadow)"/>
  <text x="860" y="427" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#991b1b">PostgreSQL</text>
  <text x="860" y="455" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">JPA persistence</text>

  <rect x="752" y="536" width="216" height="84" rx="18" fill="#f5f3ff" stroke="#c4b5fd" filter="url(#shadow)"/>
  <text x="860" y="571" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#5b21b6">Upload Storage</text>
  <text x="860" y="598" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Attachments and images</text>

  <rect x="996" y="154" width="150" height="134" rx="18" fill="#ecfeff" stroke="#67e8f9" filter="url(#shadow)"/>
  <text x="1071" y="194" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#155e75">SpringDoc</text>
  <text x="1071" y="220" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">OpenAPI JSON</text>
  <text x="1071" y="242" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">Swagger UI</text>
  <text x="1071" y="264" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">/api/v3/api-docs</text>

  <path d="M 256 212 L 346 212" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="301" y="196" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1d4ed8">/app/</text>

  <path d="M 480 288 L 480 350" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="518" y="324" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1d4ed8">API calls</text>

  <path d="M 604 412 C 662 412 662 228 710 228" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="655" y="376" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1d4ed8">/api/*</text>

  <path d="M 860 310 L 860 376" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="895" y="348" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1d4ed8">JPA</text>

  <path d="M 860 310 C 1020 392 1020 536 970 578" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="1032" y="454" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1d4ed8">Files</text>

  <path d="M 1000 222 L 1008 222" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="997" y="207" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1d4ed8">generated from code</text>

  <rect x="66" y="552" width="540" height="68" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="88" y="581" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Security note</text>
  <text x="88" y="606" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Swagger/OpenAPI paths are public; application API endpoints stay protected by Bearer auth.</text>
</svg>
