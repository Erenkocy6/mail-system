server {
    listen 8080;
    return 301 https://$host$request_uri;
}

server {
    listen 8443 ssl;

    ssl_certificate /run/secrets/proxy_certificate;
    ssl_certificate_key /run/secrets/proxy_private_key;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = / {
        return 301 /app/;
    }

    location /app/ {
        proxy_pass http://mailclient:80/app/;
    }

    location /api/ {
        proxy_pass http://mailserver:8080/api/;
    }
}
