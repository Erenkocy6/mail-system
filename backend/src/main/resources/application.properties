spring.application.name=${APP_NAME:backend}
spring.mvc.problemdetails.enabled=true
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/api}

springdoc.api-docs.path=${SPRINGDOC_API_DOCS_PATH:/v3/api-docs}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.path=${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}

spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:dbuser}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:create-drop}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${OAUTH2_ISSUER_URI:http://localhost:9080/realms/mail-system}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${OAUTH2_JWK_SET_URI:http://localhost:9080/realms/mail-system/protocol/openid-connect/certs}

file.upload-dir=${FILE_UPLOAD_DIR:uploads}

mail.gateway.from-address=${MAIL_FROM_ADDRESS:}

mail.gateway.smtp.enabled=${MAIL_SMTP_ENABLED:false}
mail.gateway.smtp.host=${MAIL_SMTP_HOST:mailgate.thm.de}
mail.gateway.smtp.port=${MAIL_SMTP_PORT:465}
mail.gateway.smtp.username=${MAIL_SMTP_USERNAME:}
mail.gateway.smtp.password=${MAIL_SMTP_PASSWORD:}
mail.gateway.smtp.auth=${MAIL_SMTP_AUTH:true}
mail.gateway.smtp.ssl-enabled=${MAIL_SMTP_SSL_ENABLED:true}
mail.gateway.smtp.starttls-enabled=${MAIL_SMTP_STARTTLS_ENABLED:false}
mail.gateway.smtp.connection-timeout-millis=${MAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}
mail.gateway.smtp.read-timeout-millis=${MAIL_SMTP_READ_TIMEOUT_MS:3000}
mail.gateway.smtp.write-timeout-millis=${MAIL_SMTP_WRITE_TIMEOUT_MS:5000}

mail.gateway.imap.enabled=${MAIL_IMAP_ENABLED:false}
mail.gateway.imap.host=${MAIL_IMAP_HOST:mailgate.thm.de}
mail.gateway.imap.port=${MAIL_IMAP_PORT:993}
mail.gateway.imap.username=${MAIL_IMAP_USERNAME:}
mail.gateway.imap.password=${MAIL_IMAP_PASSWORD:}
mail.gateway.imap.folder=${MAIL_IMAP_FOLDER:INBOX}
mail.gateway.imap.ssl-enabled=${MAIL_IMAP_SSL_ENABLED:true}
mail.gateway.imap.connection-timeout-millis=${MAIL_IMAP_CONNECTION_TIMEOUT_MS:5000}
mail.gateway.imap.read-timeout-millis=${MAIL_IMAP_READ_TIMEOUT_MS:5000}
mail.gateway.imap.fetch-limit=${MAIL_IMAP_FETCH_LIMIT:20}
mail.gateway.imap.poll-initial-delay-millis=${MAIL_IMAP_POLL_INITIAL_DELAY_MS:10000}
mail.gateway.imap.poll-delay-millis=${MAIL_IMAP_POLL_DELAY_MS:60000}
